<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DanikField — Статистика</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div id="app">
  <main>
    <div class="stats-layout">
      <h1><i data-lucide="bar-chart-3" style="width:22px;height:22px"></i> Статистика</h1>
      <div class="stats-grid">
        <div class="stat-card stat-main"><i data-lucide="gamepad-2" class="stat-icon"></i><div class="stat-value" id="stat-total-games">0</div><div class="stat-label">Игр сыграно</div></div>
        <div class="stat-card"><i data-lucide="trophy" class="stat-icon"></i><div class="stat-value" id="stat-wins">0</div><div class="stat-label">Побед</div></div>
        <div class="stat-card"><i data-lucide="trending-up" class="stat-icon"></i><div class="stat-value" id="stat-winrate">0%</div><div class="stat-label">Winrate</div></div>
        <div class="stat-card"><i data-lucide="zap" class="stat-icon"></i><div class="stat-value" id="stat-best-time">--:--</div><div class="stat-label">Лучшее время</div></div>
        <div class="stat-card"><i data-lucide="flame" class="stat-icon"></i><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Серия побед</div></div>
        <div class="stat-card"><i data-lucide="star" class="stat-icon"></i><div class="stat-value" id="stat-total-xp">0</div><div class="stat-label">Всего XP</div></div>
      </div>
      <h2 class="section-header"><i data-lucide="calendar" style="width:18px;height:18px"></i> Активность (30 дней)</h2>
      <div class="activity-heatmap" id="activity-heatmap"></div>
      <h2 class="section-header" style="margin-top:2rem"><i data-lucide="award" style="width:18px;height:18px"></i> Достижения</h2>
      <div class="achievements-grid" id="achievements-grid"></div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container"></div>
<div class="modal-overlay" id="pro-modal" style="display:none"><div class="modal-content" style="text-align:center"><button class="modal-close" id="modal-close-pro">x</button><h2>Upgrade to Pro</h2></div></div>
<script type="module" src="/src/stats-entry.js"></script>
</body></html>
