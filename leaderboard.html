<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DanikField — Рейтинг</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div id="app">
  <main>
    <div class="leaderboard-layout">
      <div class="leaderboard-header">
        <h1><i data-lucide="trophy" style="width:22px;height:22px"></i> Глобальный рейтинг</h1>
        <div class="leaderboard-filters">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="global" id="filter-global"><i data-lucide="globe" style="width:14px;height:14px"></i> Мир</button>
            <button class="filter-btn" data-filter="city" id="filter-city"><i data-lucide="building-2" style="width:14px;height:14px"></i> Города</button>
          </div>
          <div id="city-selector" style="display:none">
            <select id="city-select">
              <option value="almaty">Алматы</option><option value="astana">Астана</option>
              <option value="moscow">Москва</option><option value="spb">Санкт-Петербург</option>
              <option value="london">Лондон</option><option value="tokyo">Токио</option><option value="nyc">Нью-Йорк</option>
            </select>
          </div>
        </div>
      </div>
      <div class="podium" id="podium">
        <div class="podium-place place-2"><div class="podium-rank">2</div><div class="podium-name" id="p2-name">---</div><div class="podium-score" id="p2-score">---</div><div class="podium-bar"></div></div>
        <div class="podium-place place-1"><div class="podium-rank">1</div><div class="podium-name" id="p1-name">---</div><div class="podium-score" id="p1-score">---</div><div class="podium-bar"></div></div>
        <div class="podium-place place-3"><div class="podium-rank">3</div><div class="podium-name" id="p3-name">---</div><div class="podium-score" id="p3-score">---</div><div class="podium-bar"></div></div>
      </div>
      <div class="leaderboard-table-container">
        <table class="leaderboard-table"><thead><tr><th>#</th><th>Игрок</th><th>Город</th><th>Очки</th><th>Игры</th><th>Win%</th><th>Лучшее</th></tr></thead>
        <tbody id="leaderboard-tbody"></tbody></table>
      </div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container"></div>
<div class="modal-overlay" id="pro-modal" style="display:none"><div class="modal-content" style="text-align:center"><button class="modal-close" id="modal-close-pro">x</button><h2>Upgrade to Pro</h2></div></div>
<script type="module" src="/src/leaderboard-entry.js"></script>
</body></html>
